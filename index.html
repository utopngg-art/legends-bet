<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGENDS BET | Premium Sportsbook</title>
    <style>
        /* Professional Dark Theme */
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --accent: #10b981; 
            --accent-hover: #059669;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #2a3548;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        header { background-color: #0b1120; padding: 15px 30px; border-bottom: 1px solid var(--border); z-index: 100; }
        .logo { font-size: 1.8em; font-weight: 900; color: var(--accent); letter-spacing: 1px; }
        .logo span { color: white; }
        
        /* 3-Column App Layout */
        .app-container { display: flex; flex: 1; overflow: hidden; }

        /* Left Sidebar: Sports Categories */
        .sidebar-left { width: 220px; background-color: #0b1120; border-right: 1px solid var(--border); padding: 20px 0; overflow-y: auto; }
        .sidebar-title { color: var(--text-sub); font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding: 0 20px; }
        .sport-menu { list-style: none; padding: 0; margin: 0; }
        .sport-menu li { padding: 12px 20px; cursor: pointer; color: var(--text-main); font-weight: bold; border-left: 3px solid transparent; transition: 0.2s; }
        .sport-menu li:hover { background-color: var(--bg-hover); }
        .sport-menu li.active { border-left-color: var(--accent); background-color: var(--bg-hover); color: var(--accent); }

        /* Middle Feed: Games */
        .feed { flex: 1; padding: 30px; overflow-y: auto; background-color: var(--bg-main); }
        .feed-title { margin-top: 0; margin-bottom: 25px; font-size: 1.5em; border-bottom: 2px solid var(--border); padding-bottom: 10px;}
        
        .game-card { background-color: var(--bg-card); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border); }
        .match-header { display: flex; justify-content: space-between; color: var(--text-sub); font-size: 0.85em; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;}
        .teams { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .market-title { font-size: 0.85em; color: var(--text-sub); margin-bottom: 8px; text-align: center; }
        .odds-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .odd-btn { flex: 1; background-color: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;}
        .odd-btn:hover { border-color: var(--accent); }
        .odd-btn.selected { background-color: var(--accent); border-color: var(--accent); color: #000; }
        .odd-btn.selected .odd-name, .odd-btn.selected .odd-price { color: #000; }
        .odd-name { color: var(--text-sub); font-size: 0.9em; pointer-events: none;}
        .odd-price { font-weight: bold; font-size: 1.1em; color: var(--accent); pointer-events: none;}

        /* Right Sidebar: Betslip */
        .sidebar-right { width: 320px; background-color: var(--bg-card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .betslip-header { padding: 20px; background-color: #0b1120; border-bottom: 1px solid var(--border); margin: 0; font-size: 1.2em; text-align: center; font-weight: bold;}
        
        .slip-items { flex: 1; overflow-y: auto; padding: 20px; }
        .empty-slip { color: var(--text-sub); text-align: center; margin-top: 50%; font-size: 0.95em; }
        
        .slip-item { background-color: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--accent); position: relative; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ef4444; cursor: pointer; font-weight: bold; font-size: 1.2em;}
        .slip-match { font-size: 0.85em; color: var(--text-sub); margin-bottom: 8px; padding-right: 20px; }
        .slip-pick { font-weight: bold; font-size: 1.05em; display: flex; justify-content: space-between; }
        
        .calculator { padding: 20px; background-color: #0b1120; border-top: 1px solid var(--border); }
        .calc-row { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        .stake-input { background-color: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100px; text-align: right; font-size: 1.1em; outline: none; font-weight: bold;}
        .stake-input:focus { border-color: var(--accent); }
        .win-amount { color: var(--accent); font-weight: bold; font-size: 1.4em; }
        .parlay-badge { background-color: #3b82f6; color: white; font-size: 0.7em; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold;}
        
        .place-bet-btn { width: 100%; background-color: var(--accent); color: #000; font-weight: bold; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; transition: 0.2s;}
        .place-bet-btn:hover { background-color: var(--accent-hover); }
        .place-bet-btn:disabled { background-color: #334155; color: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <div class="logo">LEGENDS<span>BET</span></div>
    </header>

    <div class="app-container">
        <div class="sidebar-left">
            <div class="sidebar-title">Sports</div>
            <ul class="sport-menu">
                <li class="active">⚽ Football (Soccer)</li>
                <li onclick="alert('We will connect basketball data next!')">🏀 Basketball</li>
                <li onclick="alert('We will connect tennis data next!')">🎾 Tennis</li>
                <li onclick="alert('We will connect volleyball data next!')">🏐 Volleyball</li>
                <li onclick="alert('We will connect rugby data next!')">🏈 Rugby</li>
            </ul>
        </div>

        <div class="feed" id="games-feed">
            <h2 class="feed-title">Live Matches</h2>
            <p style="text-align:center; color: #94a3b8; margin-top: 40px;">Loading live odds from your secure server...</p>
        </div>

        <div class="sidebar-right">
            <h2 class="betslip-header">🧾 Betslip</h2>
            
            <div class="slip-items" id="slip-items">
                <div class="empty-slip">Your betslip is empty.<br>Click on odds to build your parlay!</div>
            </div>
            
            <div class="calculator">
                <div class="calc-row">
                    <span>Type:</span>
                    <span id="bet-type" style="color: var(--text-sub);">Single</span>
                </div>
                <div class="calc-row">
                    <span>Total Odds:</span>
                    <span id="total-odds" style="font-weight: bold; font-size: 1.2em;">0.00</span>
                </div>
                <div class="calc-row">
                    <span>Stake ($):</span>
                    <input type="number" id="stake" class="stake-input" value="10" min="1" oninput="calculateWin()">
                </div>
                <div class="calc-row" style="margin-top: 15px;">
                    <span>Potential Win:</span>
                    <span id="potential-win" class="win-amount">$0.00</span>
                </div>
                <button id="place-btn" class="place-bet-btn" disabled onclick="alert('Parlay placed successfully! (Demo)')">Place Bet</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://main-betting-app.onrender.com/api/odds';
        
        // PARLAY ENGINE: This array holds MULTIPLE bets!
        let betslip = []; 

        async function fetchOdds() {
            try {
                const response = await fetch(API_URL);
                const games = await response.json();
                const feed = document.getElementById('games-feed');
                feed.innerHTML = '<h2 class="feed-title">Live Matches</h2>'; 

                if (games.length === 0) {
                    feed.innerHTML += '<p style="text-align:center;">No live games available.</p>'; return;
                }

                games.forEach(game => {
                    let h2hHtml = '<p style="text-align:center; color:#555;">Odds locked</p>';
                    let matchTitle = `${game.homeTeam} vs ${game.awayTeam}`;
                    let safeMatchId = matchTitle.replace(/[^a-zA-Z0-9]/g, ""); // Create a safe ID for buttons
                    
                    if (game.oddsData && game.oddsData.length > 0) {
                        // 1x2 Market
                        const h2h = game.oddsData[0].markets.find(m => m.key === 'h2h');
                        if (h2h && h2h.outcomes) {
                            h2hHtml = `
                                <div class="market-title">Match Winner (1 X 2)</div>
                                <div class="odds-row">
                                    ${h2h.outcomes.map(outcome => {
                                        let safePickId = outcome.name.replace(/[^a-zA-Z0-9]/g, "");
                                        let btnId = `btn-${safeMatchId}-${safePickId}`;
                                        return `
                                        <button id="${btnId}" class="odd-btn" onclick="toggleBet('${matchTitle}', '${outcome.name}', ${outcome.price}, '${btnId}')">
                                            <span class="odd-name">${outcome.name}</span>
                                            <span class="odd-price">${outcome.price}</span>
                                        </button>
                                        `;
                                    }).join('')}
                                </div>
                            `;
                        }
                    }

                    const matchDate = new Date(game.matchDate).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <div class="match-header"><span>⚽ ${game.sport}</span><span>📅 ${matchDate}</span></div>
                        <div class="teams"><span>${game.homeTeam}</span><span style="color:#94a3b8; font-size:0.8em;">VS</span><span>${game.awayTeam}</span></div>
                        ${h2hHtml}
                    `;
                    feed.appendChild(card);
                });
            } catch (error) {
                document.getElementById('games-feed').innerHTML = '<p style="color: #ef4444; text-align:center;">Error connecting to servers.</p>';
            }
        }

        // --- THE PARLAY LOGIC ---
        function toggleBet(match, pick, price, btnId) {
            // Check if this match is already in the betslip
            const existingIndex = betslip.findIndex(b => b.match === match);
            
            if (existingIndex > -1) {
                // If they clicked the exact same bet, remove it
                if (betslip[existingIndex].pick === pick) {
                    betslip.splice(existingIndex, 1);
                } else {
                    // If they picked a different team in the same match, swap it!
                    betslip[existingIndex] = { match, pick, price, btnId };
                }
            } else {
                // Add brand new bet to the parlay array
                betslip.push({ match, pick, price, btnId });
            }
            
            updateUI();
        }

        function removeBet(index) {
            betslip.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            // 1. Reset all buttons visually
            document.querySelectorAll('.odd-btn').forEach(btn => btn.classList.remove('selected'));
            
            // 2. Highlight selected buttons
            betslip.forEach(bet => {
                const activeBtn = document.getElementById(bet.btnId);
                if(activeBtn) activeBtn.classList.add('selected');
            });

            // 3. Render the Betslip
            const slipContainer = document.getElementById('slip-items');
            if (betslip.length === 0) {
                slipContainer.innerHTML = '<div class="empty-slip">Your betslip is empty.<br>Click on odds to build your parlay!</div>';
                document.getElementById('total-odds').innerText = "0.00";
                document.getElementById('bet-type').innerText = "None";
                document.getElementById('place-btn').disabled = true;
                calculateWin();
                return;
            }

            slipContainer.innerHTML = betslip.map((bet, index) => `
                <div class="slip-item">
                    <button class="remove-btn" onclick="removeBet(${index})">×</button>
                    <div class="slip-match">${bet.match}</div>
                    <div class="slip-pick">
                        <span>${bet.pick}</span>
                        <span style="color:#10b981;">${bet.price.toFixed(2)}</span>
                    </div>
                </div>
            `).join('');

            // 4. Calculate Parlay Math (Multiply all odds together)
            let totalOdds = betslip.reduce((total, bet) => total * bet.price, 1);
            
            document.getElementById('total-odds').innerText = totalOdds.toFixed(2);
            document.getElementById('bet-type').innerHTML = betslip.length > 1 ? `<span class="parlay-badge">${betslip.length}-Leg Parlay</span>` : 'Single';
            document.getElementById('place-btn').disabled = false;
            
            calculateWin();
        }

        function calculateWin() {
            const stake = parseFloat(document.getElementById('stake').value) || 0;
            const totalOdds = parseFloat(document.getElementById('total-odds').innerText) || 0;
            const win = (stake * totalOdds).toFixed(2);
            document.getElementById('potential-win').innerText = '$' + win;
        }

        fetchOdds();
    </script>
</body>
</html>
